<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <style>
        /* Estilo da Página */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* Fundo branco solicitado */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .loader-container {
            text-align: center;
        }

        /* Spinner com Gradiente */
        .spinner {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            border-radius: 50%;
            /* Gradiente moderno */
            background: conic-gradient(from 0deg, transparent 20%, #00f2fe, #4facfe, #8e2de2);
            animation: spin 0.8s linear infinite;
        }

        /* O círculo interno para dar o efeito de anel */
        .spinner::before {
            content: "";
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            bottom: 6px;
            background-color: white;
            border-radius: 50%;
        }

        /* Texto "Aguarde..." */
        .loading-text {
            color: #333;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Animação de Rotação */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <div class="loading-text">Aguarde...</div>
    </div>

    <script>
        // Configurações
        const tempoDeEspera = 3000; // 3 segundos em milissegundos
        const destino = "https://offeersegurooo.vercel.app/"; // SUBSTITUA PELO SEU LINK AQUI

        // Função de redirecionamento
        setTimeout(() => {
            window.location.href = destino;
        }, tempoDeEspera);
    </script>

</body>
</html>
