<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    <style>
        /* Fundo branco e texto escuro para contraste */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Fundo Branco */
            color: #000000; /* Texto Preto */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animação do spinner com as cores do TikTok como gradiente interligado */
        .spinner {
            position: relative; /* Necessário para o elemento de máscara */
            width: 70px;
            height: 70px;
            border-radius: 50%;
            /* Base color fallback */
            background-color: #69C9D0;
            /* Gradiente cônico interligando as cores */
            background: conic-gradient(
                from 0deg,
                #69C9D0 0deg,   /* Ciano TikTok (Top) */
                #EE1D52 90deg,  /* Rosa/Vermelho TikTok (Right) */
                #010101 180deg, /* Preto TikTok (Bottom) */
                #69C9D0 360deg  /* Volta ao Ciano */
            );
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
            /* Sombra mais suave para fundo branco */
            box-shadow: 0 0 15px rgba(105, 201, 208, 0.2), 0 0 15px rgba(238, 29, 82, 0.2);
        }

        /* Elemento de máscara para criar o anel (buraco no meio) */
        .spinner::after {
            content: '';
            position: absolute;
            top: 6px; /* Espessura do anel (insets de 6px) */
            left: 6px;
            right: 6px;
            bottom: 6px;
            border-radius: 50%;
            background-color: #ffffff; /* Mesma cor do fundo do corpo */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Estilo do texto */
        h1 {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            color: #000000;
            /* Efeito de sombra leve nas cores do TikTok */
            text-shadow: 1px 1px 0px #EE1D52, -1px -1px 0px #69C9D0;
        }

        p {
            font-size: 16px;
            color: #555555; /* Cinza escuro para o subtítulo */
            margin: 0;
        }

        #countdown {
            font-weight: bold;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecionando...</h1> <!-- Texto alterado -->
        <p>Aguarde <span id="countdown">3</span> segundos...</p>
    </div>

    <script>
        // Configuração do tempo e redirecionamento
        let tempoRestante = 3;
        const elementoContagem = document.getElementById('countdown');
        
        // --- COLOQUE SEU LINK ABAIXO ---
        const linkDestino = "https://offeersegurooo.vercel.app/"; // Substitua pelo seu link de afiliado/venda

        const intervalo = setInterval(() => {
            tempoRestante--;
            
            // Evita mostrar números negativos se houver delay
            if (tempoRestante >= 0) {
                elementoContagem.textContent = tempoRestante;
            }

            if (tempoRestante <= 0) {
                clearInterval(intervalo);
                window.location.href = linkDestino; // Executa o redirecionamento
            }
        }, 1000); // 1 segundo
    </script>

</body>
</html>
