<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <style>
        /* Reset básico e fundo preto padrão do TikTok */
        body {
            margin: 0;
            padding: 0;
            background-color: #010101; 
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animação do spinner com as cores do TikTok */
        .spinner {
            width: 70px;
            height: 70px;
            border: 6px solid #333; /* Cor de fundo do anel */
            border-top: 6px solid #69C9D0; /* Ciano TikTok */
            border-right: 6px solid #EE1D52; /* Rosa/Vermelho TikTok */
            border-bottom: 6px solid #ffffff; /* Branco */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(105, 201, 208, 0.4), 0 0 20px rgba(238, 29, 82, 0.4);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Estilo do texto com efeito "Glitch" leve */
        h1 {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #EE1D52, -2px -2px 0px #69C9D0;
        }

        p {
            font-size: 16px;
            color: #bbbbbb;
            margin: 0;
        }

        #countdown {
            font-weight: bold;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <h1>Carregando...</h1>
        <p>Redirecionando em <span id="countdown">3</span> segundos</p>
    </div>

    <script>
        // Configuração do tempo e redirecionamento
        let tempoRestante = 3;
        const elementoContagem = document.getElementById('countdown');
        
        // Coloque o seu link de destino de afiliado/venda aqui embaixo:
        const linkDestino = "https://offeersegurooo.vercel.app/";

        const intervalo = setInterval(() => {
            tempoRestante--;
            elementoContagem.textContent = tempoRestante;

            if (tempoRestante <= 0) {
                clearInterval(intervalo);
                window.location.href = linkDestino; // Executa o redirecionamento
            }
        }, 1000); // 1000 milissegundos = 1 segundo
    </script>

</body>
</html>
